<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Generator</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            color: black;
            background-color: white;
        }

        .container {
            max-width: 600px;
            margin-bottom: 20px;
        }

        .input-field {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }

        .btn-generate {
            padding: 5px 10px;
            cursor: pointer;
        }

        #status-area {
            margin-top: 10px;
            font-weight: bold;
        }

        .result-container {
            max-width: 800px;
            margin-top: 20px;
            border-top: 2px solid black;
            padding-top: 10px;
        }

        pre {
            background-color: #eee;
            padding: 10px;
            overflow-x: auto;
        }
    </style>

</head>

<body>

    <div class="container">
        <h2>Upload Resume</h2>
        <form id="uploadForm">

            <label for="resume">File (PDF/DOCX):</label>
            <input type="file" id="resume" accept=".pdf,.docx" required>

            <button type="submit" id="btn">Upload and Process</button>
            <button onclick="simulateLogin()">Simulate Login</button>
        </form>
        <p id="status"></p>
    </div>
    <!-- Result Area to Display Assessment -->
    <div class="result-container" id="resultContainer" style="display: none;">
        <h2>Generated Assessments</h2>
        <div id="assessmentButtons"></div>
        <div id="assessmentDetails"></div>
    </div>

    <div class="result-container" id="existingContainer" style="margin-top: 40px;">
        <h2>My Existing Assessments</h2>
        <div id="existingList" style="display: flex; flex-direction: column; gap: 10px;">
            Loading assessments...
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const status = document.getElementById('status');
        const resultContainer = document.getElementById('resultContainer');

        async function simulateLogin() {
            const response = await fetch('http://localhost:3000/api/v1/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'test@email.com', password: 'testpass' })
            });

            const result = await response.json();
            if (result.token) {
                localStorage.setItem('token', result.token);
                alert('Login successful! Token stored in localStorage.');
            }
        }

        // Display generated assessment (from assessmentold.html pattern)
        function displayAssessment(data) {
            resultContainer.style.display = 'block';
            const btnContainer = document.getElementById('assessmentButtons');
            const detailsContainer = document.getElementById('assessmentDetails');
            btnContainer.innerHTML = '';
            detailsContainer.innerHTML = '';

            const claimedSkillsSection = document.createElement('div');
            claimedSkillsSection.innerHTML = '<h3 style="margin-bottom: 5px;">Claimed Skills Assessments</h3><p style="font-size: 14px; margin-top: 0; color: #555;">Based strictly on the skills parsed from your resume.</p><div id="claimedSkillsBtns" style="margin-bottom: 20px;"></div>';

            const targetTitleSection = document.createElement('div');
            targetTitleSection.innerHTML = '<h3 style="margin-bottom: 5px;">Target Job Title Assessments</h3><p style="font-size: 14px; margin-top: 0; color: #555;">Additional must-have skills generated intelligently based purely on your desired job role.</p><div id="targetTitleBtns" style="margin-bottom: 20px;"></div>';

            btnContainer.appendChild(claimedSkillsSection);
            btnContainer.appendChild(targetTitleSection);

            if (data.assessment && Array.isArray(data.assessment.assessments)) {
                data.assessment.assessments.forEach((assmnt, index) => {
                    const btn = document.createElement('button');
                    btn.textContent = `View ${assmnt.skill || `Assessment ${index + 1}`}`;
                    btn.style.marginRight = '10px';
                    btn.style.marginBottom = '10px';

                    if (assmnt.section && assmnt.section.includes('Target Job Title')) {
                        targetTitleSection.querySelector('#targetTitleBtns').appendChild(btn);
                    } else {
                        claimedSkillsSection.querySelector('#claimedSkillsBtns').appendChild(btn);
                    }

                    const detailDiv = document.createElement('div');
                    detailDiv.style.display = 'none';
                    detailDiv.style.marginTop = '20px';
                    detailDiv.style.borderTop = '1px dashed black';
                    detailDiv.style.paddingTop = '10px';

                    let htmlContent = `<h3>${assmnt.title || assmnt.skill} (${assmnt.priority || ''})</h3>`;
                    detailDiv.innerHTML = htmlContent;

                    const questionsContainer = document.createElement('div');

                    if (assmnt.questions) {
                        assmnt.questions.forEach((q, qIndex) => {
                            const qBlock = document.createElement('div');
                            qBlock.style.marginBottom = '30px';
                            qBlock.className = 'question-block';

                            let blockHtml = `<strong>Q${q.id || (qIndex + 1)}: ${q.question || ''}</strong><br>`;
                            if (q.code_snippet && q.code_snippet !== 'null') {
                                blockHtml += `<pre>${String(q.code_snippet).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>`;
                            }

                            blockHtml += `<div style="margin-top: 10px;">`;
                            let renderOptions = q.options;
                            if ((!renderOptions || renderOptions.length === 0) && String(q.type).toLowerCase() === 'true_false') {
                                renderOptions = ['True', 'False'];
                            }
                            if (renderOptions && renderOptions.length > 0) {
                                renderOptions.forEach((opt, optIndex) => {
                                    blockHtml += `
                                        <div style="margin-bottom: 8px;">
                                            <label style="cursor: pointer; display: flex; align-items: start; gap: 8px;">
                                                <input type="radio" name="q-${index}-${qIndex}" value="${String(opt).replace(/"/g, '&quot;')}" style="margin-top: 4px;" />
                                                <span>${String(opt).replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span>
                                            </label>
                                        </div>
                                    `;
                                });
                            } else {
                                blockHtml += `
                                    <div style="margin-bottom: 8px;">
                                        <input type="text" class="text-answer" name="q-${index}-${qIndex}" placeholder="Type your answer here..." style="width: 100%; max-width: 400px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" />
                                    </div>
                                `;
                            }
                            blockHtml += `</div>`;

                            blockHtml += `
                                <div class="feedback" style="display: none; margin-top: 15px; padding: 12px; background-color: #f9f9f9; border-left: 4px solid #ccc;">
                                    <div class="feedback-result" style="font-weight: bold; margin-bottom: 5px;"></div>
                                    <div style="margin-bottom: 5px;"><em>Correct Answer: <span style="font-weight: 500;">${String(q.correct_answer || '').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</span></em></div>
                                    <div><small><strong>Explanation:</strong> ${q.explanation || ''}</small></div>
                                </div>
                            `;

                            qBlock.innerHTML = blockHtml;
                            qBlock.correctAnswerValue = q.correct_answer;
                            qBlock.dbId = q.db_id;
                            questionsContainer.appendChild(qBlock);
                        });
                    }

                    detailDiv.appendChild(questionsContainer);

                    if (assmnt.questions && assmnt.questions.length > 0) {
                        const submitBtn = document.createElement('button');
                        submitBtn.textContent = 'Submit Answers';
                        submitBtn.style.marginTop = '15px';
                        submitBtn.style.padding = '8px 16px';
                        submitBtn.style.cursor = 'pointer';
                        submitBtn.style.backgroundColor = '#000';
                        submitBtn.style.color = '#fff';
                        submitBtn.style.border = 'none';
                        submitBtn.style.fontWeight = 'bold';
                        submitBtn.style.width = 'auto';

                        submitBtn.onclick = async () => {
                            const qBlocks = questionsContainer.querySelectorAll('.question-block');
                            let resultsToSave = [];

                            qBlocks.forEach(block => {
                                const selectedInput = block.querySelector('input[type="radio"]:checked');
                                const textInput = block.querySelector('input[type="text"].text-answer');
                                const feedback = block.querySelector('.feedback');
                                const feedbackResult = block.querySelector('.feedback-result');

                                feedback.style.display = 'block';

                                let userSelectedVal = null;
                                if (selectedInput) {
                                    userSelectedVal = String(selectedInput.value).trim();
                                } else if (textInput && textInput.value.trim() !== '') {
                                    userSelectedVal = String(textInput.value).trim();
                                }

                                if (userSelectedVal !== null) {
                                    feedbackResult.textContent = 'Submitted';
                                    feedbackResult.style.color = '#555';
                                } else {
                                    feedbackResult.textContent = 'No answer provided';
                                    feedbackResult.style.color = 'orange';
                                    feedback.style.borderLeftColor = 'orange';
                                }

                                resultsToSave.push({
                                    question_id: block.dbId,
                                    selected_option: userSelectedVal
                                });

                                block.querySelectorAll('input').forEach(inp => inp.disabled = true);
                            });

                            const token = localStorage.getItem('token');
                            if (token && resultsToSave.length > 0) {
                                let scoreDiv = document.createElement('div');
                                scoreDiv.style.marginTop = '20px';
                                scoreDiv.style.padding = '15px';
                                scoreDiv.style.backgroundColor = '#f0f0f0';
                                scoreDiv.style.borderLeft = '4px solid #000';
                                scoreDiv.style.fontSize = '18px';
                                scoreDiv.style.fontWeight = 'bold';
                                scoreDiv.textContent = 'Verifying answers...';
                                detailDiv.appendChild(scoreDiv);

                                try {
                                    const submitRes = await fetch('http://localhost:3000/api/v1/submit', {
                                        method: 'POST',
                                        headers: {
                                            'Content-Type': 'application/json',
                                            'Authorization': `Bearer ${token}`
                                        },
                                        body: JSON.stringify({ results: resultsToSave })
                                    });
                                    const submitData = await submitRes.json();
                                    if (submitRes.ok) {
                                        scoreDiv.textContent = `You scored ${submitData.score} out of ${qBlocks.length}!`;
                                        scoreDiv.innerHTML += '<br><small style="color: green;">Results successfully saved!</small>';
                                    } else {
                                        scoreDiv.innerHTML = `<small style="color: red;">Failed to save: ${submitData.error || 'Unknown error'}</small>`;
                                    }
                                } catch (err) {
                                    scoreDiv.innerHTML += '<br><small style="color: red;">Network error saving results.</small>';
                                }
                            }
                            submitBtn.style.display = 'none';
                        };

                        detailDiv.appendChild(submitBtn);
                    }

                    btn.onclick = () => {
                        Array.from(detailsContainer.children).forEach(child => child.style.display = 'none');
                        detailDiv.style.display = 'block';
                    };

                    detailsContainer.appendChild(detailDiv);
                });

                // Cleanup empty sections
                if (targetTitleSection.querySelector('#targetTitleBtns').children.length === 0) {
                    targetTitleSection.style.display = 'none';
                }
                if (claimedSkillsSection.querySelector('#claimedSkillsBtns').children.length === 0) {
                    claimedSkillsSection.style.display = 'none';
                }
            } else {
                detailsContainer.innerHTML = '<pre>' + JSON.stringify(data.assessment, null, 2) + '</pre>';
            }
        }

        // Upload form: extract → generate → display
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = localStorage.getItem('token');
            if (!token) {
                status.style.color = "red";
                status.innerText = "Please log in first.";
                return;
            }

            const fileInput = document.getElementById('resume');
            if (!fileInput.files[0]) {
                status.style.color = "red";
                status.innerText = "Please select a file first.";
                return;
            }

            const formData = new FormData();
            formData.append('resume', fileInput.files[0]);

            status.style.color = "#444";
            status.innerText = "Parsing resume...";

            try {
                // Step 1: Extract text from PDF
                const extractRes = await fetch('http://localhost:3000/api/v1/extract', {
                    method: 'POST',
                    body: formData,
                    headers: { "Authorization": `Bearer ${token}` }
                });

                const extractData = await extractRes.json();
                console.log("Extract result:", extractData);

                if (!extractRes.ok || !extractData.success) {
                    throw new Error(extractData.error || "Failed to parse resume");
                }

                const resumeText = extractData.resumeText;
                status.innerText = `Resume parsed (${resumeText.length} chars). Generating assessments...`;

                // Step 2: Generate both claimed + target in one call
                const generateRes = await fetch('http://localhost:3000/api/v1/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ resumeText })
                });

                const generateData = await generateRes.json();
                console.log("Generate result:", generateData);

                if (!generateRes.ok || !generateData.success) {
                    throw new Error(generateData.error || "Failed to generate assessment");
                }

                status.style.color = "green";
                status.innerText = "Assessments generated successfully!";

                // Step 3: Display
                displayAssessment(generateData);
                loadExistingAssessments();

            } catch (err) {
                status.style.color = "red";
                status.innerText = "Error: " + err.message;
                console.error("Error:", err);
            }
        });


        // Load existing assessments
        async function loadExistingAssessments() {
            const listContainer = document.getElementById('existingList');
            const token = localStorage.getItem('token');
            if (!token) return;

            try {
                const res = await fetch('http://localhost:3000/api/v1/my-results', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);

                if (data.results && data.results.length > 0) {
                    listContainer.innerHTML = '';
                    data.results.forEach(assmnt => {
                        const row = document.createElement('div');
                        row.style.padding = '10px';
                        row.style.border = '1px solid #ccc';
                        row.style.borderRadius = '4px';
                        row.style.display = 'flex';
                        row.style.justifyContent = 'space-between';
                        row.style.alignItems = 'center';

                        row.innerHTML = `
                            <div>
                                <strong>${assmnt.skill}</strong> - ${assmnt.job_title}<br>
                                <small>${new Date(assmnt.created_at).toLocaleDateString()}</small>
                            </div>
                            <a href="/view-assessment?id=${assmnt.id}" style="padding: 5px 10px; background: #000; color: #fff; text-decoration: none; border-radius: 4px; font-size: 14px;">Take Assessment</a>
                        `;
                        listContainer.appendChild(row);
                    });
                } else {
                    listContainer.innerHTML = 'No assessments generated yet.';
                }
            } catch (err) {
                listContainer.innerHTML = `<span style="color:red">Error loading assessments: ${err.message}</span>`;
            }
        }

        loadExistingAssessments();
    </script>
</body>

</html>
