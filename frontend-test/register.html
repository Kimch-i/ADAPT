<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
</head>
<body>
    <h2>Register</h2>
    <div id="error-msg" style="color: red; margin-bottom: 10px;"></div>
    <form id="registerForm">
        <input type="text" id="full_name" placeholder="Full Name" required><br><br>
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <input type="text" id="location" placeholder="Location" required><br><br>
        <input type="text" id="preferred_job_title" placeholder="Dream Job" required><br><br>
        <button type="submit">Level Up Your Career</button>
    </form>
    <p>Already have an account? <a href="/login">Sign In</a></p>

    <script>
        const registerForm = document.getElementById('registerForm');
        const errorMsg = document.getElementById('error-msg');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.innerText = '';
            const payload = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                location: document.getElementById('location').value,
                preferred_job_title: document.getElementById('preferred_job_title').value
            };

            try {
                const response = await fetch('/api/v1/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/assessment';
                } else {
                    throw new Error(data.error || data.message || 'Registration failed');
                }
            } catch (err) {
                errorMsg.innerText = err.message;
            }
        });
    </script>
</body>
</html>
